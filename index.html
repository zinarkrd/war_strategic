<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>ناڤەندا ستراتیژی - Monitor PRO v6</title>

   <!-- Firebase SDK -->
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
       @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700;900&display=swap');
       :root { --primary: #d97706; --bg: #0c0908; }
       body { font-family: 'Vazirmatn', sans-serif; background-color: var(--bg); color: #d1d5db; margin: 0; padding: 0; overflow-x: hidden; }
       .main-wrapper { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; min-height: 90vh; padding-bottom: 120px; }
       .nav-menu { background: rgba(21, 17, 16, 0.96); backdrop-filter: blur(20px); border-bottom: 1px solid #2d2421; padding: 12px 5px; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; }
       .nav-link { color: #71717a; font-size: 11px; font-weight: 900; cursor: pointer; padding: 8px 10px; border-radius: 12px; }
       .nav-link.active { color: var(--primary); background: rgba(217, 119, 6, 0.1); }
       .dashboard-card { background: linear-gradient(145deg, #151110, #0e0b0a); border: 1px solid #241f1d; border-radius: 24px; padding: 22px; margin-bottom: 18px; }
       .input-admin { width: 100%; background: #1a1514; border: 1px solid #332a28; border-radius: 12px; padding: 14px; color: white; margin-bottom: 10px; font-size: 14px; }
       .hidden { display: none; }
   </style>
</head>
<body>

   <nav class="nav-menu">
       <div onclick="showPage('home')" id="nav-home" class="nav-link active">سەرەکی</div>
       <div onclick="showPage('predictions')" id="nav-predictions" class="nav-link">پێشبینی</div>
       <div onclick="showPage('admin')" id="nav-admin" class="nav-link"><i class="fas fa-lock"></i> کۆنترۆڵ</div>
       <div onclick="showPage('contact')" id="nav-contact" class="nav-link">پەیوەندی</div>
   </nav>

   <div id="home-page" class="main-wrapper">
       <div class="flex justify-between items-center mb-8">
           <div id="live-time" class="text-3xl font-black text-orange-500 font-mono tracking-tighter">00:00:00</div>
           <div class="text-right text-white"><h1 class="text-2xl font-black">ناڤەندا <span class="text-orange-500">ستراتیژی</span></h1></div>
       </div>
       <div id="feed-home" class="space-y-4"></div>
   </div>

   <div id="predictions-page" class="main-wrapper hidden">
       <h2 class="text-2xl font-black text-right mb-6">چاڤدێریا <span class="text-orange-500">پێشبینیان</span></h2>
       <div id="box-short" class="dashboard-card border-r-4 border-orange-500 text-right"></div>
       <div id="box-long" class="dashboard-card border-r-4 border-blue-500 text-right"></div>
       <div id="feed-predictions" class="space-y-4"></div>
   </div>

   <div id="admin-page" class="main-wrapper hidden">
       <div id="login-section" class="dashboard-card">
           <h2 class="text-xl font-black text-white mb-6 text-center">چوونە ژوور بۆ <span class="text-orange-500">کۆنترۆڵێ</span></h2>
           <input type="text" id="admin-user" class="input-admin" placeholder="ناڤێ بەکارهێنەری">
           <input type="password" id="admin-pass" class="input-admin" placeholder="پاسوۆرد">
           <button onclick="handleLogin()" class="w-full bg-orange-600 text-black font-black py-4 rounded-xl mt-2 active:scale-95 transition">چوونە ژوور</button>
       </div>

       <div id="control-panel" class="hidden">
           <div class="flex justify-between items-center mb-6">
               <button onclick="logout()" class="text-xs text-red-500 font-bold underline">دەرکەفتن</button>
               <h2 class="text-xl font-black text-white">بەلاڤکرنا <span class="text-orange-500">زانیاریان</span></h2>
           </div>
           <div class="dashboard-card space-y-4">
               <select id="post-category" class="input-admin" onchange="toggleAdminSub()">
                   <option value="home">نویچەیێن سەرەکی (Home)</option>
                   <option value="predictions">پێشبینی (Predictions)</option>
               </select>
               <div id="admin-sub-wrap" class="hidden">
                   <select id="post-sub" class="input-admin">
                       <option value="short">کورت مەودا</option>
                       <option value="long">دوور مەودا</option>
                   </select>
               </div>
               <input type="text" id="post-tag" class="input-admin" placeholder="تاگ (نموونە: بەپەلە)">
               <input type="text" id="post-title" class="input-admin" placeholder="ناڤ و نیشان">
               <textarea id="post-text" class="input-admin h-32" placeholder="دەقێ زانیاریێ..."></textarea>
               <button onclick="submitPost()" id="publish-btn" class="w-full bg-green-600 text-black font-black py-4 rounded-xl shadow-lg">بەلاڤ بکە</button>
           </div>
           <div id="admin-history-list" class="mt-8 space-y-2"></div>
       </div>
   </div>

   <div id="contact-page" class="main-wrapper hidden text-right">
       <h2 class="text-2xl font-black text-white mb-6">پەیوەندی</h2>
       <div class="space-y-4">
           <a href="https://wa.me/9647502274597" class="dashboard-card flex justify-between items-center">
               <i class="fab fa-whatsapp text-green-500 text-2xl"></i>
               <div class="text-right"><span class="block text-white font-bold">WhatsApp</span><span class="text-xs text-zinc-500">+964 750 227 4597</span></div>
           </a>
           <a href="https://www.instagram.com/chiy4stan" class="dashboard-card flex justify-between items-center">
               <i class="fab fa-instagram text-pink-500 text-2xl"></i>
               <div class="text-right"><span class="block text-white font-bold">Instagram</span><span class="text-xs text-zinc-500">@chiy4stan</span></div>
           </a>
       </div>
   </div>

   <script>
       // Security: داتا زانیارییەکانی چوونەژوورەوە لێرە بە شێوەی ئاسایی دانانێین
       // ئەمانە کۆدی پارێزراوی ئیمێڵ و پاسوۆردەکەتن (Encoded)
       const _u = "emluYXJicmhhbm11c3RlZmE="; // zinarbrhanmustefa
       const _p = "emluYXJicmhhbg==";         // zinarbrhan

       const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
       const appId = typeof __app_id !== 'undefined' ? __app_id : 'tactical-v6-pro-final';
       const dbPath = `artifacts/${appId}/public/data/monitor_final`;

       if (firebaseConfig.apiKey) firebase.initializeApp(firebaseConfig);
       const db = firebase.firestore();
       const auth = firebase.auth();

       let isAdmin = false;

       async function init() {
           try {
               await auth.signInAnonymously();
               listenToData();
           } catch(e) { console.error(e); }
       }

       function listenToData() {
           db.collection(dbPath).onSnapshot(snap => {
               const data = [];
               snap.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
               renderUI(data);
           });
       }

       function renderUI(data) {
           const home = document.getElementById('feed-home');
           const pred = document.getElementById('feed-predictions');
           const adminHist = document.getElementById('admin-history-list');
           [home, pred, adminHist].forEach(el => el.innerHTML = '');

           data.sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

           data.forEach(item => {
               const card = document.createElement('div');
               card.className = "dashboard-card text-right";
               card.innerHTML = `<h3 class="text-white font-bold">${item.title}</h3><p class="text-sm text-zinc-400 mt-2">${item.text}</p>`;
               
               if(item.category === 'home') home.appendChild(card);
               else pred.appendChild(card);

               if(isAdmin) {
                   const h = document.createElement('div');
                   h.className = "bg-white/5 p-3 rounded flex justify-between";
                   h.innerHTML = `<button onclick="deleteDoc('${item.id}')" class="text-red-500">Delete</button> <span class="text-xs">${item.title}</span>`;
                   adminHist.appendChild(h);
               }
           });
       }

       function handleLogin() {
           const u = btoa(document.getElementById('admin-user').value);
           const p = btoa(document.getElementById('admin-pass').value);
           if(u === _u && p === _p) {
               isAdmin = true;
               document.getElementById('login-section').classList.add('hidden');
               document.getElementById('control-panel').classList.remove('hidden');
               listenToData();
           } else alert("Invalid!");
       }

       function logout() { isAdmin = false; location.reload(); }

       async function submitPost() {
           const title = document.getElementById('post-title').value;
           const text = document.getElementById('post-text').value;
           const cat = document.getElementById('post-category').value;
           if(!title || !text) return alert("Fill all!");
           await db.collection(dbPath).add({
               title, text, category: cat,
               timestamp: firebase.firestore.FieldValue.serverTimestamp()
           });
           alert("Published!");
       }

       async function deleteDoc(id) { if(confirm("Sure?")) await db.collection(dbPath).doc(id).delete(); }

       function showPage(id) {
           document.querySelectorAll('.main-wrapper').forEach(p => p.classList.add('hidden'));
           document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
           document.getElementById(id + '-page').classList.remove('hidden');
           document.getElementById('nav-' + id).classList.add('active');
       }

       function toggleAdminSub() { document.getElementById('admin-sub-wrap').classList.toggle('hidden', document.getElementById('post-category').value !== 'predictions'); }

       setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleTimeString('en-GB', {hour12:false}); }, 1000);
       window.onload = init;
   </script>
</body>
</html>
