<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Admin Panel PRO</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: #0c0908; 
            color: #e5e7eb; 
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .admin-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .glass-card {
            background: linear-gradient(145deg, #151110, #0e0b0a);
            border: 1px solid #2d2421;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-group label {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #71717a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input, textarea, select {
            width: 100%;
            background: #1a1513;
            border: 1px solid #332a26;
            color: white;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 16px;
            text-align: right;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.1);
        }

        .primary-btn {
            width: 100%;
            background: linear-gradient(90deg, #d97706, #fbbf24);
            color: #000;
            padding: 16px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(217, 119, 6, 0.2);
            transition: 0.3s;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(217, 119, 6, 0.3);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(239, 68, 68, 0.2);
            cursor: pointer;
        }

        .hidden { display: none !important; }

        #login-section, #panel-section { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    
    <div class="admin-container">
        <!-- 1. Login Section -->
        <div id="login-section" class="mt-20">
            <div class="text-center mb-8">
                <div class="inline-block p-4 rounded-3xl bg-orange-500/10 mb-4">
                    <i class="fas fa-shield-halved text-4xl text-orange-500"></i>
                </div>
                <h1 class="text-2xl font-black text-white">ناڤەندا ستراتیژی</h1>
                <p class="text-zinc-500 text-sm mt-1">کۆنتڕۆڵ پانێڵا پێشکەفتی</p>
            </div>
            
            <div class="glass-card">
                <div class="input-group">
                    <label>پاسۆردێ چوونەژوورێ</label>
                    <input type="password" id="pw-input" placeholder="••••••••" class="text-center tracking-widest">
                </div>
                <button onclick="handleLogin()" class="primary-btn">
                    <i class="fas fa-sign-in-alt"></i> چوونەژوورەوە
                </button>
            </div>
        </div>

        <!-- 2. Main Panel Section -->
        <div id="panel-section" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <button onclick="handleLogout()" class="logout-btn">
                    <i class="fas fa-power-off ml-1"></i> دەرچوون
                </button>
                <div class="text-right">
                    <h2 class="text-xl font-black text-white">بەخێرهاتی <span class="text-orange-500">سەرۆک</span></h2>
                    <p class="text-[10px] text-zinc-500">Monitor PRO v6.5</p>
                </div>
            </div>

            <div class="glass-card">
                <div class="input-group">
                    <label>پۆلێنکردنا بابەتی</label>
                    <select id="post-cat" onchange="toggleSubView()">
                        <option value="home">سەرەکی (Home Feed)</option>
                        <option value="predictions">پێشبینی (Predictions)</option>
                    </select>
                </div>

                <div id="sub-category-view" class="hidden">
                    <div class="input-group">
                        <label>جۆرێ پێشبینیێ</label>
                        <select id="post-sub-cat">
                            <option value="short">کورت مەودا</option>
                            <option value="long">دوور مەودا</option>
                            <option value="observers">چاڤدێرێن سیاسی</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>سەردێڕ (Title)</label>
                    <input type="text" id="post-title-in" placeholder="سەردێڕێ نووچەی بنڤیسە">
                </div>

                <div class="input-group">
                    <label>ناوەرۆکا بابەتی</label>
                    <textarea id="post-text-in" rows="5" placeholder="هەمی پێزانینان لێرە بنڤیسە..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group">
                        <label>نیشان (Tag)</label>
                        <input type="text" id="post-tag-in" placeholder="URGENT">
                    </div>
                    <div class="flex items-start pt-6">
                        <button onclick="submitToFirebase()" id="submit-btn" class="primary-btn">
                            <i class="fas fa-paper-plane"></i> بەلاڤکرن
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-10 text-center">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-green-500/10 border border-green-500/20">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-green-500 uppercase tracking-widest">System Online</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tactical-v6-pro-final';
        
        if (firebaseConfig.apiKey) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Security Check: Watch for Auth State Changes
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('panel-section').classList.remove('hidden');
            } else {
                document.getElementById('panel-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('pw-input').value = ""; 
            }
        });

        // Login Logic
        function handleLogin() {
            const pass = document.getElementById('pw-input').value;
            if(pass === "020303018") {
                auth.signInAnonymously().catch(e => alert("Auth Error: " + e.message));
            } else {
                alert("پاسۆرد خەلەتە! دووبارە تاقی بکەڤە.");
            }
        }

        // Logout Logic (Fully Fixed)
        async function handleLogout() {
            if(confirm("ئەرێ تو پشت راستی ژ دەرکەفتنێ؟")) {
                try {
                    await auth.signOut();
                } catch (e) {
                    alert("Logout failed: " + e.message);
                }
            }
        }

        function toggleSubView() {
            const cat = document.getElementById('post-cat').value;
            document.getElementById('sub-category-view').classList.toggle('hidden', cat !== 'predictions');
        }

        async function submitToFirebase() {
            if (!auth.currentUser) return alert("تو چوونەژوورێ نەکرییە!");

            const btn = document.getElementById('submit-btn');
            const title = document.getElementById('post-title-in').value;
            const text = document.getElementById('post-text-in').value;
            const cat = document.getElementById('post-cat').value;
            const sub = document.getElementById('post-sub-cat').value;
            const tag = document.getElementById('post-tag-in').value;

            if(!title || !text) return alert("تکایە هەمی خانەیان پڕ بکە!");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            try {
                await db.collection(`artifacts/${appId}/public/data/monitor_final`).add({
                    title: title,
                    text: text,
                    category: cat,
                    sub: cat === 'predictions' ? sub : null,
                    tag: tag || 'UPDATE',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert("ب سەرکەفتی هاتە بەلاڤکرن!");
                document.getElementById('post-title-in').value = "";
                document.getElementById('post-text-in').value = "";
                document.getElementById('post-tag-in').value = "";
            } catch(e) {
                alert("کێشەیەک دروست بوو: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> بەلاڤکرن';
            }
        }
    </script>
</body>
</html>
