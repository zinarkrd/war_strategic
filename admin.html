<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناڤەندا ستراتیژی - Admin PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background: #0c0908; color: #e5e7eb; margin: 0; }
        .glass-card { background: #151110; border: 1px solid #2d2421; border-radius: 24px; padding: 25px; }
        input, textarea, select { width: 100%; background: #1a1513; border: 1px solid #332a26; color: white; padding: 14px; margin-bottom: 15px; border-radius: 16px; text-align: right; outline: none; }
        .primary-btn { width: 100%; background: linear-gradient(90deg, #d97706, #fbbf24); color: #000; padding: 16px; border-radius: 18px; font-weight: 900; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex justify-center min-height-screen">
    <div class="w-full max-w-md p-5">
        
        <!-- Login Section -->
        <div id="login-sec" class="mt-20">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-white">ناڤەندا <span class="text-orange-500">ستراتیژی</span></h1>
                <p class="text-zinc-500 text-sm">کۆنتڕۆڵ پانێڵ</p>
            </div>
            <div class="glass-card">
                <input type="password" id="pw" placeholder="پاسۆرد">
                <button onclick="handleLogin()" class="primary-btn">چوونەژوورەوە</button>
            </div>
        </div>

        <!-- Panel Section -->
        <div id="panel-sec" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <button onclick="handleLogout()" class="text-red-500 text-xs font-bold">دەرچوون</button>
                <h2 class="text-xl font-black text-orange-500">سڵاو ئەدمین</h2>
            </div>
            
            <div class="glass-card">
                <label class="block text-right text-[10px] text-zinc-500 mb-2">بەشێ بابەتێ خۆ هەلبژێرە</label>
                <select id="cat">
                    <option value="home">لاپەڕەی سەرەکی (Home)</option>
                    <option value="predictions">بەشی پێشبینی (Predictions)</option>
                    <option value="observers">بەشی چاودێری (Observers)</option>
                </select>

                <input type="text" id="t" placeholder="سەردێڕ">
                <textarea id="m" rows="5" placeholder="دەق لێرە بنووسە..."></textarea>

                <button onclick="handlePost()" id="post-btn" class="primary-btn">بەلاڤکرن</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tactical-v6-pro-final';
        
        if (firebaseConfig.apiKey) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-sec').classList.add('hidden');
                document.getElementById('panel-sec').classList.remove('hidden');
            } else {
                document.getElementById('panel-sec').classList.add('hidden');
                document.getElementById('login-sec').classList.remove('hidden');
            }
        });

        async function handleLogin() {
            if (document.getElementById('pw').value === "020303018") {
                await auth.signInAnonymously();
            } else { alert("پاسۆرد خەلەتە!"); }
        }

        async function handleLogout() {
            await auth.signOut();
            location.reload();
        }

        async function handlePost() {
            const btn = document.getElementById('post-btn');
            const title = document.getElementById('t').value;
            const text = document.getElementById('m').value;
            const cat = document.getElementById('cat').value;

            if(!title || !text) return alert("هەمی خانەیان پڕ بکە");

            btn.disabled = true; btn.innerText = "...";

            try {
                // دڵنیا دەبینەوە کە داتا بۆ هەمان جێگەی وێبسایتەکە دەچێت
                await db.collection(`artifacts/${appId}/public/data/monitor_final`).add({
                    title: title,
                    text: text,
                    category: cat,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert("بە سەرکەفتی هاتە بەلاڤکرن!");
                document.getElementById('t').value = "";
                document.getElementById('m').value = "";
            } catch(e) { alert(e.message); }
            btn.disabled = false; btn.innerText = "بەلاڤکرن";
        }
    </script>
</body>
</html>
